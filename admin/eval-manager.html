<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>評核主管</title>
<link rel="stylesheet" href="../shared/style.css?v=20260624c">
<script src="../shared/config.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<style>
  .eval-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .eval-layout { grid-template-columns: 1fr; } }
  .score-row { display: grid; grid-template-columns: 1fr 70px; gap: 8px; align-items: center; margin-bottom: 6px; }
  .evidence-block { background: #f7f6fb; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
  .total-box { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; padding: 16px; border-radius: var(--radius); text-align: center; }
  .total-num { font-size: 36px; font-weight: 800; }
  .bonus-add-row { display: grid; grid-template-columns: 1fr 100px; gap: 8px; align-items: center; margin: 4px 0; }
</style>
</head>
<body>
<div id="app-header"></div>

<div class="container">
  <h2>📝 評核部門主管</h2>

  <div class="card">
    <div class="form-grid">
      <div class="form-row">
        <label>選擇主管</label>
        <select id="select-manager" onchange="loadEvidence()"></select>
      </div>
      <div class="form-row">
        <label>評核月份</label>
        <input type="month" id="select-month" onchange="loadEvidence()">
      </div>
    </div>
  </div>

  <div id="eval-content" style="display:none;">
    <div class="eval-layout">
      <div>
        <div class="card">
          <div class="card-title">📂 證據彙整</div>
          <div id="summary"></div>
          <div id="dept-info" class="evidence-block"></div>
          <div id="evidence-list"></div>
        </div>
      </div>

      <div>
        <div class="card">
          <div class="card-title">📊 KPI 評分（70 分）</div>
          <div id="score-inputs"></div>
        </div>

        <div class="card">
          <div class="card-title">🎯 OKR 評分（30 分）</div>
          <div class="form-row">
            <label>OKR 達成度評分</label>
            <input type="number" id="score_okr" min="0" max="30" value="0" oninput="recalc()">
          </div>
        </div>

        <div class="card">
          <div class="card-title">💰 加碼獎勵</div>
          <div class="bonus-add-row"><label>OKR 完全達成</label><input type="number" id="bonus_okr" value="0" oninput="recalc()"></div>
          <div class="bonus-add-row"><label>部門招生 ≥110%</label><input type="number" id="bonus_recruit" value="0" oninput="recalc()"></div>
          <div class="bonus-add-row"><label>部門 KPI 平均 ≥65</label><input type="number" id="bonus_dept" value="0" oninput="recalc()"></div>
        </div>

        <div class="card">
          <div class="card-title">💬 評語與面談紀錄</div>
          <div class="form-row">
            <label>主管評語（柏翰）</label>
            <textarea id="boss_comment"></textarea>
          </div>
          <div class="form-row">
            <label>面談紀錄</label>
            <textarea id="interview_notes"></textarea>
          </div>
        </div>

        <div class="total-box">
          <div>KPI <span id="kpi-total">0</span> + OKR <span id="okr-display">0</span></div>
          <div class="total-num"><span id="total-score">0</span> / 100</div>
          <div>⭐ <span id="grade">—</span></div>
          <div style="margin-top:8px;">最終獎金 NT$<span id="final-bonus">0</span></div>
          <div class="text-sm" id="dept-warning"></div>
        </div>

        <div class="mt-2 flex gap-1">
          <button class="btn" onclick="saveEval('draft')">儲存草稿</button>
          <button class="btn btn-primary" onclick="saveEval('submitted')">完成評核</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const session = AUTH.requireRole(['admin']);
let deptAvg = 0;

window.addEventListener('load', async () => {
  UI.mountHeader(session);
  await loadManagerOptions();
  document.getElementById('select-month').value = new Date().toISOString().slice(0, 7);
  renderScoreInputs();
});

async function loadManagerOptions() {
  const res = await API.listUsers();
  if (!res.ok) return;
  const managers = res.users.filter(u => u.role === 'manager');
  const sel = document.getElementById('select-manager');
  sel.innerHTML = '<option value="">-- 選擇主管 --</option>' +
    managers.map(m => `<option value="${m.nickname}">${m.nickname}（${m.department}）</option>`).join('');
}

function renderScoreInputs() {
  const KPI_DEF = APP_CONFIG.MANAGER_KPI;
  const wrap = document.getElementById('score-inputs');
  wrap.innerHTML = KPI_DEF.map(k => `
    <div class="score-row">
      <div>${k.icon} ${k.name}（滿分 ${k.max}）</div>
      <input type="number" id="score_m${k.no}" min="0" max="${k.max}" value="0" oninput="recalc()">
    </div>
  `).join('');
}

async function loadEvidence() {
  const nickname = document.getElementById('select-manager').value;
  const ym = document.getElementById('select-month').value;
  if (!nickname || !ym) return;

  UI.loading(true);
  const res = await API.getEvalEvidence(nickname, ym);
  UI.loading(false);
  if (!res.ok) { UI.toast(res.error, 'danger'); return; }

  document.getElementById('eval-content').style.display = 'block';
  deptAvg = await calcDeptAvg(res.department, ym);

  document.getElementById('summary').innerHTML = `
    <div class="stat-grid mb-2">
      <div class="stat-box"><div class="stat-num">${res.summary.log_count}</div><div class="stat-label">日誌</div></div>
      <div class="stat-box"><div class="stat-num">${res.summary.posts_total}</div><div class="stat-label">發文</div></div>
      <div class="stat-box"><div class="stat-num">${res.summary.observation_count}</div><div class="stat-label">觀課</div></div>
    </div>
  `;

  // 部門資訊
  document.getElementById('dept-info').innerHTML = `
    <strong>🏫 ${res.department}</strong> 本月部門老師平均 KPI：
    <span style="color:${deptAvg < 55 ? 'var(--danger)' : 'var(--success)'}; font-weight:700;">${deptAvg || '尚無評核'}</span>
    ${deptAvg < 55 && deptAvg > 0 ? '<div class="tag tag-danger mt-1">⚠️ 部門 <55，主管獎金將連坐減半</div>' : ''}
  `;

  // 證據（針對主管的 6 大類）
  const KPI_DEF = APP_CONFIG.MANAGER_KPI;
  document.getElementById('evidence-list').innerHTML = KPI_DEF.map(k => {
    const ev = res.evidence_by_kpi[k.no] || [];
    let extra = '';
    if (k.no === 4) {
      const weeksOk = Object.values(res.posts_by_week).filter(c => c >= 3).length;
      const weeksTotal = Object.keys(res.posts_by_week).length;
      extra = `<div class="text-sm">📣 發文週數：${weeksOk}/${weeksTotal} 達標（共 ${res.summary.posts_total} 篇）</div>`;
    }
    return `<div class="evidence-block">
      <div style="font-weight:700; color:var(--primary);">${k.icon} M${k.no} ${k.name}</div>
      ${extra}
      ${ev.length === 0 ? '<div class="muted text-sm">無附件證據</div>' :
        ev.map(e => `<div class="text-sm"><a href="${e.url}" target="_blank">📎 ${UI.formatDate(e.date)} ${e.description || ''}</a></div>`).join('')}
    </div>`;
  }).join('');

  // 套用建議分數
  Object.entries(res.suggestion).forEach(([key, val]) => {
    const num = key.replace('k', '');
    const el = document.getElementById('score_m' + num);
    if (el) el.value = val;
  });

  // 載入已有評核
  const existRes = await API.getEval({ nickname, year_month: ym });
  if (existRes.ok && existRes.eval) {
    const e = existRes.eval;
    for (let i = 1; i <= 6; i++) {
      const v = e['score_m' + i];
      if (v !== '' && v != null) document.getElementById('score_m' + i).value = v;
    }
    document.getElementById('score_okr').value = e.score_okr || 0;
    document.getElementById('bonus_okr').value = e.bonus_okr || 0;
    document.getElementById('bonus_recruit').value = e.bonus_recruit || 0;
    document.getElementById('bonus_dept').value = e.bonus_dept || 0;
    document.getElementById('boss_comment').value = e.boss_comment || '';
    document.getElementById('interview_notes').value = e.interview_notes || '';
  }
  recalc();
}

async function calcDeptAvg(department, ym) {
  const r = await API.listEvals({ year_month: ym });
  if (!r.ok) return 0;
  const usersR = await API.listUsers();
  const deptTeachers = usersR.users.filter(u => u.department === department && u.role === 'teacher').map(u => u.nickname);
  const list = r.evals.filter(e => deptTeachers.includes(e.nickname));
  if (list.length === 0) return 0;
  const sum = list.reduce((s, e) => s + Number(e.total_score || 0), 0);
  return Math.round((sum / list.length) * 10) / 10;
}

function recalc() {
  let kpi = 0;
  for (let i = 1; i <= 6; i++) {
    kpi += Number(document.getElementById('score_m' + i).value || 0);
  }
  const okr = Number(document.getElementById('score_okr').value || 0);
  document.getElementById('kpi-total').textContent = kpi;
  document.getElementById('okr-display').textContent = okr;
  document.getElementById('total-score').textContent = kpi + okr;

  let grade = '—', baseBonus = 0;
  if (kpi >= 67) { grade = '卓越'; baseBonus = 5000; }
  else if (kpi >= 63) { grade = '優良'; baseBonus = 3500; }
  else if (kpi >= 60) { grade = '達標'; baseBonus = 2000; }
  else if (kpi >= 55) { grade = '基本合格'; baseBonus = 0; }
  else { grade = '待改善'; baseBonus = 0; }

  const extras = ['bonus_okr', 'bonus_recruit', 'bonus_dept']
    .reduce((s, id) => s + Number(document.getElementById(id).value || 0), 0);
  let finalBonus = baseBonus + extras;
  let warning = '';
  if (deptAvg > 0 && deptAvg < 55) {
    finalBonus = Math.round(finalBonus / 2);
    warning = '⚠️ 部門平均 <55，獎金已連坐減半';
  }
  document.getElementById('grade').textContent = grade;
  document.getElementById('final-bonus').textContent = finalBonus;
  document.getElementById('dept-warning').textContent = warning;
}

async function saveEval(status) {
  const nickname = document.getElementById('select-manager').value;
  const ym = document.getElementById('select-month').value;
  if (!nickname || !ym) {
    UI.toast('請選擇主管與月份', 'warn');
    return;
  }
  const payload = {
    nickname, year_month: ym, evaluator: session.nickname, status,
    score_okr: Number(document.getElementById('score_okr').value || 0),
    bonus_okr: Number(document.getElementById('bonus_okr').value || 0),
    bonus_recruit: Number(document.getElementById('bonus_recruit').value || 0),
    bonus_dept: Number(document.getElementById('bonus_dept').value || 0),
    dept_avg_score: deptAvg,
    boss_comment: document.getElementById('boss_comment').value,
    interview_notes: document.getElementById('interview_notes').value,
  };
  for (let i = 1; i <= 6; i++) {
    payload['score_m' + i] = Number(document.getElementById('score_m' + i).value || 0);
  }
  UI.loading(true);
  const res = await API.saveEval(payload);
  UI.loading(false);
  if (!res.ok) { UI.toast(res.error, 'danger'); return; }
  UI.toast(`儲存成功（${res.grade} · NT$${res.bonus}）`, 'success');
}
</script>
</body>
</html>
