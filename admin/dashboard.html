<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>全機構總覽</title>
<link rel="stylesheet" href="../shared/style.css?v=20260624i">
<script src="../shared/config.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<style>
  .dept-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 900px) { .dept-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 500px) { .dept-grid { grid-template-columns: 1fr; } }
  .dept-card {
    background: #fff; border-radius: var(--radius); padding: 18px 14px;
    box-shadow: var(--shadow); text-align: center;
    transition: transform 0.15s;
  }
  .dept-card:hover { transform: translateY(-2px); }
  .dept-name { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
  .dept-stat { font-size: 14px; margin: 4px 0; }
  .dept-score { font-size: 32px; font-weight: 800; color: var(--accent); }
</style>
</head>
<body>
<div id="app-header"></div>

<div class="container">
  <h2>👑 全機構總覽 · <span id="ym"></span></h2>

  <div class="dept-grid" id="dept-grid"></div>

  <div class="card mt-2">
    <div class="card-title">📊 機構統計</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num" id="total-users">—</div><div class="stat-label">總人數</div></div>
      <div class="stat-box"><div class="stat-num" id="total-today">—</div><div class="stat-label">今日已交</div></div>
      <div class="stat-box"><div class="stat-num" id="total-help">—</div><div class="stat-label">求助標記</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🔔 待處理事項</div>
    <ul id="todos" style="margin:0; padding-left:20px;"></ul>
  </div>

  <div class="card">
    <div class="card-title">🎭 切換身份檢視（測試用）</div>
    <div class="muted text-sm mb-2">以下會以指定身份開啟對應頁面，方便你檢核老師/主管實際看到什麼。隨時可從頂部橫條離開。</div>
    <div id="impersonate-list"></div>
  </div>
</div>

<script>
const session = AUTH.requireRole(['admin']);

window.addEventListener('load', async () => {
  UI.mountHeader(session);
  document.getElementById('ym').textContent = new Date().toISOString().slice(0, 7);
  await loadDashboard();
  await loadImpersonateList();
});

async function loadImpersonateList() {
  const res = await API.listUsers();
  if (!res.ok) return;
  const grouped = { manager: [], teacher: [], admin_staff: [] };
  res.users.forEach(u => {
    if (grouped[u.role]) grouped[u.role].push(u);
  });
  const wrap = document.getElementById('impersonate-list');
  const staffBlock = grouped.admin_staff.length ? `
    <div style="margin-top:12px;">
      <div style="font-weight:700; margin-bottom:6px;">📁 行政</div>
      <div style="display:flex; flex-wrap:wrap; gap:6px;">
        ${grouped.admin_staff.map(u => `<button class="btn btn-sm" onclick="impersonateAs('${u.nickname}')">${u.nickname}（${u.department}）</button>`).join('')}
      </div>
    </div>` : '';
  wrap.innerHTML = `
    <div style="margin-bottom:12px;">
      <div style="font-weight:700; margin-bottom:6px;">👔 主管</div>
      <div style="display:flex; flex-wrap:wrap; gap:6px;">
        ${grouped.manager.map(u => `<button class="btn btn-sm" onclick="impersonateAs('${u.nickname}')">${u.nickname}（${u.department}）</button>`).join('')}
      </div>
    </div>
    <div>
      <div style="font-weight:700; margin-bottom:6px;">👩‍🏫 老師</div>
      <div style="display:flex; flex-wrap:wrap; gap:6px;">
        ${grouped.teacher.map(u => `<button class="btn btn-sm" onclick="impersonateAs('${u.nickname}')">${u.nickname}（${u.department}）</button>`).join('')}
      </div>
    </div>
    ${staffBlock}
  `;
}

function impersonateAs(nickname) {
  const res = APP_CONFIG; // 暫存
  API.listUsers().then(r => {
    if (!r.ok) return;
    const target = r.users.find(u => u.nickname === nickname);
    if (!target) { UI.toast('找不到使用者', 'danger'); return; }
    AUTH.impersonate(target);
    const root = AUTH.relativeRoot();
    if (target.role === 'manager') window.location.href = root + 'manager/dashboard.html';
    else window.location.href = root + 'teacher/today.html';
  });
}

async function loadDashboard() {
  UI.loading(true);
  const res = await API.getDashboard(session.nickname);
  UI.loading(false);
  if (!res.ok) {
    UI.toast(res.error, 'danger');
    return;
  }
  const grid = document.getElementById('dept-grid');
  grid.innerHTML = res.departments.map(d => `
    <div class="dept-card">
      <div class="dept-name">🏫 ${d.department}</div>
      <div class="dept-stat">主管：<strong>${d.manager}</strong></div>
      <div class="dept-stat">老師 ${d.teachers_count} 位</div>
      <div class="dept-stat">今日已交 ${d.today_submitted}/${d.teachers_count}</div>
      <div class="dept-score">${d.month_avg !== null ? d.month_avg : '—'}</div>
      <div class="text-sm muted">本月平均 KPI 分數</div>
    </div>
  `).join('');

  document.getElementById('total-users').textContent = res.total_users;
  const todaySubmitted = res.departments.reduce((s, d) => s + d.today_submitted, 0);
  document.getElementById('total-today').textContent = todaySubmitted;

  // todos
  const todos = [];
  const today = new Date();
  if (today.getDate() >= 25) {
    todos.push('本月評核期：提醒各部門主管在月底完成老師評核');
    todos.push('柏翰：本月主管評核截止日：' + today.getFullYear() + '/' + (today.getMonth()+1) + '/' + new Date(today.getFullYear(), today.getMonth()+1, 0).getDate());
  }
  res.departments.forEach(d => {
    if (d.month_avg !== null && Number(d.month_avg) < 55) {
      todos.push(`⚠️ ${d.department} 本月平均 ${d.month_avg}（<55），主管獎金將連坐減半`);
    }
  });
  document.getElementById('todos').innerHTML = todos.length === 0
    ? '<li class="muted">目前無待處理事項</li>'
    : todos.map(t => `<li>${t}</li>`).join('');
}
</script>
</body>
</html>
