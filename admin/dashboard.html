<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>全機構總覽</title>
<link rel="stylesheet" href="../shared/style.css?v=20260624k">
<script src="../shared/config.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/pwa.js"></script>
<script src="../shared/push.js"></script>
<style>
  .dept-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 900px) { .dept-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 500px) { .dept-grid { grid-template-columns: 1fr; } }
  .dept-card {
    background: #fff; border-radius: var(--radius); padding: 18px 14px;
    box-shadow: var(--shadow); text-align: center;
    transition: transform 0.15s;
  }
  .dept-card:hover { transform: translateY(-2px); }
  .dept-name { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
  .dept-stat { font-size: 14px; margin: 4px 0; }
  .dept-score { font-size: 32px; font-weight: 800; color: var(--accent); }
</style>
</head>
<body>
<div id="app-header"></div>

<style>
  @keyframes notifyPulse { 0%,100%{ box-shadow:0 2px 10px rgba(245,148,30,.25);} 50%{ box-shadow:0 4px 18px rgba(245,148,30,.45);} }
  @keyframes bellSwing { 0%,60%,100%{ transform:rotate(0);} 70%{ transform:rotate(14deg);} 80%{ transform:rotate(-10deg);} 90%{ transform:rotate(6deg);} }
  #notify-banner { cursor:pointer; background:linear-gradient(135deg,#F5941E,#FFB04A); color:#fff; padding:13px 18px; border-radius:14px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; gap:10px; animation:notifyPulse 2.6s ease-in-out infinite; }
  #notify-banner .bell { display:inline-block; animation:bellSwing 2.6s ease-in-out infinite; transform-origin:top center; }
  #notify-banner .pill { background:rgba(255,255,255,.28); border-radius:999px; padding:1px 9px; font-size:13px; }
  #notify-banner .go { font-size:13px; opacity:.95; }
  #notify-box.flash { box-shadow:0 0 0 3px #F5941E; transition:box-shadow .3s; }
  /* 訊息明細彈窗 */
  .nmodal-mask { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:60; padding:16px; }
  .nmodal-mask.show { display:flex; }
  .nmodal { background:#fff; border-radius:16px; width:100%; max-width:480px; max-height:82vh; overflow:auto; padding:20px; }
  .nmodal h3 { margin:0; color:var(--primary); }
  .nmodal .nitem { display:flex; gap:10px; padding:12px 0; border-bottom:1px solid var(--border); font-size:14px; line-height:1.6; }
  .nmodal .nitem:last-child { border-bottom:none; }
</style>

<div class="container">
  <h2>👑 全機構總覽 · <span id="ym"></span></h2>

  <!-- 即時訊息匡（點了彈出明細）-->
  <div id="notify-banner" style="display:none;" onclick="goNotify()">
    <span><span class="bell">🔔</span> 你有 <span class="pill"><span id="notify-count">0</span> 則</span> 事項通知</span>
    <span class="go">點我看 ›</span>
  </div>

  <div class="dept-grid" id="dept-grid"></div>

  <div class="card mt-2">
    <div class="card-title">📊 機構統計</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num" id="total-users">—</div><div class="stat-label">總人數</div></div>
      <div class="stat-box"><div class="stat-num" id="total-today">—</div><div class="stat-label">今日已交</div></div>
      <div class="stat-box"><div class="stat-num" id="total-help">—</div><div class="stat-label">求助標記</div></div>
    </div>
  </div>

  <div class="card" id="notify-box">
    <div class="card-title">🔔 布拉克星球事項通知欄</div>
    <ul id="todos" style="margin:0; padding-left:20px;"></ul>
  </div>

  <div class="card">
    <div class="card-title">🎭 切換身份檢視（測試用）</div>
    <div class="muted text-sm mb-2">以下會以指定身份開啟對應頁面，方便你檢核老師/主管實際看到什麼。隨時可從頂部橫條離開。</div>
    <div id="impersonate-list"></div>
  </div>
</div>

<!-- 訊息明細彈窗 -->
<div class="nmodal-mask" id="nmodal" onclick="if(event.target===this)closeNotify()">
  <div class="nmodal">
    <div class="flex-between">
      <h3>🔔 事項通知</h3>
      <button class="btn btn-sm" onclick="closeNotify()">關閉</button>
    </div>
    <div id="nmodal-body" class="mt-1"></div>
    <button class="btn btn-primary mt-2" style="width:100%;" onclick="closeNotify(); goNotifyBox();">前往通知欄 ›</button>
  </div>
</div>

<script>
const session = AUTH.requireRole(['admin']);
let notifyItems = [];

window.addEventListener('load', async () => {
  UI.mountHeader(session);
  document.getElementById('ym').textContent = new Date().toISOString().slice(0, 7);
  await loadDashboard();
  await loadImpersonateList();
});

async function loadImpersonateList() {
  const res = await API.listUsers();
  if (!res.ok) return;
  const grouped = { manager: [], teacher: [], admin_staff: [] };
  res.users.forEach(u => {
    if (grouped[u.role]) grouped[u.role].push(u);
  });
  const wrap = document.getElementById('impersonate-list');
  const staffBlock = grouped.admin_staff.length ? `
    <div style="margin-top:12px;">
      <div style="font-weight:700; margin-bottom:6px;">📁 行政</div>
      <div style="display:flex; flex-wrap:wrap; gap:6px;">
        ${grouped.admin_staff.map(u => `<button class="btn btn-sm" onclick="impersonateAs('${u.nickname}')">${u.nickname}（${u.department}）</button>`).join('')}
      </div>
    </div>` : '';
  wrap.innerHTML = `
    <div style="margin-bottom:12px;">
      <div style="font-weight:700; margin-bottom:6px;">👔 主管</div>
      <div style="display:flex; flex-wrap:wrap; gap:6px;">
        ${grouped.manager.map(u => `<button class="btn btn-sm" onclick="impersonateAs('${u.nickname}')">${u.nickname}（${u.department}）</button>`).join('')}
      </div>
    </div>
    <div>
      <div style="font-weight:700; margin-bottom:6px;">👩‍🏫 老師</div>
      <div style="display:flex; flex-wrap:wrap; gap:6px;">
        ${grouped.teacher.map(u => `<button class="btn btn-sm" onclick="impersonateAs('${u.nickname}')">${u.nickname}（${u.department}）</button>`).join('')}
      </div>
    </div>
    ${staffBlock}
  `;
}

function impersonateAs(nickname) {
  const res = APP_CONFIG; // 暫存
  API.listUsers().then(r => {
    if (!r.ok) return;
    const target = r.users.find(u => u.nickname === nickname);
    if (!target) { UI.toast('找不到使用者', 'danger'); return; }
    AUTH.impersonate(target);
    const root = AUTH.relativeRoot();
    if (target.role === 'manager') window.location.href = root + 'manager/dashboard.html';
    else window.location.href = root + 'teacher/today.html';
  });
}

async function loadDashboard() {
  UI.loading(true);
  const res = await API.getDashboard(session.nickname);
  UI.loading(false);
  if (!res.ok) {
    UI.toast(res.error, 'danger');
    return;
  }
  const grid = document.getElementById('dept-grid');
  grid.innerHTML = res.departments.map(d => `
    <div class="dept-card">
      <div class="dept-name">🏫 ${d.department}</div>
      <div class="dept-stat">主管：<strong>${d.manager}</strong></div>
      <div class="dept-stat">老師 ${d.teachers_count} 位</div>
      <div class="dept-stat">今日已交 ${d.today_submitted}/${d.teachers_count}</div>
      <div class="dept-score">${d.month_avg !== null ? d.month_avg : '—'}</div>
      <div class="text-sm muted">本月平均 KPI 分數</div>
    </div>
  `).join('');

  document.getElementById('total-users').textContent = res.total_users;
  const todaySubmitted = res.departments.reduce((s, d) => s + d.today_submitted, 0);
  document.getElementById('total-today').textContent = todaySubmitted;

  // 事項通知欄：指派給我的事項（即時）＋ 系統提醒
  const todos = [];
  let taskCount = 0;
  const todayStr = new Date().toISOString().slice(0, 10);
  try {
    const tr = await API.listTasks({ viewer: session.nickname, status: 'open' });
    if (tr.ok) {
      const mine = (tr.tasks || []).filter(t => t.assignee === session.nickname);
      taskCount = mine.length;
      mine.forEach(t => {
        const overdue = String(t.due_date) < todayStr;
        todos.push(`${overdue ? '⚠️' : '📌'} <strong>${escTodo(t.title)}</strong>（期限 ${t.due_date}${overdue ? ' 逾期' : ''}）— 來自 ${escTodo(t.created_by)}`);
      });
    }
  } catch (e) {}

  const today = new Date();
  if (today.getDate() >= 25) {
    todos.push('本月評核期：提醒各部門主管在月底完成老師評核');
    todos.push('柏翰：本月主管評核截止日：' + today.getFullYear() + '/' + (today.getMonth()+1) + '/' + new Date(today.getFullYear(), today.getMonth()+1, 0).getDate());
  }
  res.departments.forEach(d => {
    if (d.month_avg !== null && Number(d.month_avg) < 55) {
      todos.push(`⚠️ ${d.department} 本月平均 ${d.month_avg}（<55），主管獎金將連坐減半`);
    }
  });
  notifyItems = todos;
  document.getElementById('todos').innerHTML = todos.length === 0
    ? '<li class="muted">目前沒有通知</li>'
    : todos.map(t => `<li style="margin:4px 0;">${t}</li>`).join('');

  // 即時訊息匡：有事項才顯示
  const banner = document.getElementById('notify-banner');
  if (taskCount > 0) {
    document.getElementById('notify-count').textContent = taskCount;
    banner.style.display = 'flex';
  } else {
    banner.style.display = 'none';
  }
}

function escTodo(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
}

// 點訊息匡 → 彈出明細視窗
function goNotify() {
  const body = document.getElementById('nmodal-body');
  body.innerHTML = notifyItems.length
    ? notifyItems.map(t => `<div class="nitem">${t}</div>`).join('')
    : '<div class="muted">目前沒有通知</div>';
  document.getElementById('nmodal').classList.add('show');
}
function closeNotify() {
  document.getElementById('nmodal').classList.remove('show');
}
// 從彈窗前往通知欄並閃一下
function goNotifyBox() {
  const box = document.getElementById('notify-box');
  box.scrollIntoView({ behavior: 'smooth', block: 'center' });
  box.classList.add('flash');
  setTimeout(() => box.classList.remove('flash'), 1500);
}
</script>
</body>
</html>
