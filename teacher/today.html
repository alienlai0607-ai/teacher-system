<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>今日工作日報</title>
<link rel="stylesheet" href="../shared/style.css">
<script src="../shared/config.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<style>
  body { padding-bottom: 90px; }
  .step-title {
    font-size: 15px; font-weight: 800; color: var(--primary);
    margin: 0 0 4px; display: flex; align-items: center; gap: 8px;
  }
  .step-no {
    background: var(--primary); color: #fff; border-radius: 50%;
    width: 22px; height: 22px; line-height: 22px; text-align: center; font-size: 13px; flex: none;
  }
  .req { color: var(--danger); font-weight: 700; }
  .check-list label {
    display: flex; align-items: center; gap: 8px; padding: 8px 0; cursor: pointer;
    font-weight: normal; color: var(--text); font-size: 14px;
  }
  .check-list input { width: auto; }
  .punch-row { display: flex; gap: 10px; }
  .punch-row .btn { flex: 1; min-height: 46px; }
  .punch-done { background: var(--success, #2e9e5b) !important; color: #fff !important; border-color: transparent !important; }
  .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-chip {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px;
  }
  .type-chip input { width: auto; }
  .type-chip.on { background: #FFF8F0; border-color: var(--accent); }
  .dyn-card { border-left: 4px solid var(--accent); }
  .attach-area { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .attach-photo { position: relative; width: 76px; height: 76px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .attach-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .attach-photo .att-del { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.55); color: #fff; border-radius: 50%; width: 20px; height: 20px; line-height: 20px; text-align: center; font-size: 12px; cursor: pointer; }
  .photo-uploading { width: 76px; height: 76px; border-radius: 8px; border: 1px dashed var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-light); text-align: center; background: #fafafa; }
  .helper-text { font-size: 12px; color: var(--text-light); margin-top: 4px; }
  .nav-buttons {
    display: flex; gap: 10px; position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(247,246,251,0.96); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); z-index: 20;
    border-top: 1px solid var(--border); box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  }
  .nav-buttons .btn { flex: 1; min-height: 48px; font-size: 15px; }
  .miss-banner { background: #fde8e8; border: 1px solid var(--danger); color: var(--danger); border-radius: 8px; padding: 10px 12px; font-size: 13px; margin-bottom: 10px; display: none; }
</style>
</head>
<body>

<div id="app-header"></div>

<div class="container-narrow">

  <!-- Step 1 基本資料 + 打卡 -->
  <div class="card">
    <div class="step-title"><span class="step-no">1</span> 基本資料</div>
    <div class="flex-between mt-1">
      <div>
        <div class="text-lg" style="font-weight:700;">📅 <span id="today-date"></span></div>
        <div class="muted text-sm">🏫 <span id="user-dept"></span>　👤 <span id="user-nick"></span></div>
      </div>
    </div>
    <div class="form-row mt-2">
      <label>出勤打卡 <span class="req">*上班必打</span></label>
      <div class="punch-row">
        <button class="btn" id="btn-checkin" onclick="punch('checkin')">🟢 上班打卡</button>
        <button class="btn" id="btn-checkout" onclick="punch('checkout')">🔴 下班打卡</button>
      </div>
      <div class="helper-text" id="punch-info"></div>
    </div>
  </div>

  <!-- Step 2 每日必填 -->
  <div class="card">
    <div class="step-title"><span class="step-no">2</span> 環境整潔 <span class="req">*</span></div>
    <div class="check-list">
      <label><input type="checkbox" id="env_classroom"> 教室環境確認完成</label>
      <label><input type="checkbox" id="env_tools"> 教具歸位</label>
      <label><input type="checkbox" id="env_trash"> 垃圾清理</label>
    </div>
    <div class="form-row">
      <label>設備異常回報（無則免填）</label>
      <textarea id="equipment_issue" placeholder="例：A 教室投影機無法開機，已通報..."></textarea>
    </div>
  </div>

  <div class="card">
    <div class="step-title"><span class="step-no">2</span> 工作日誌 <span class="req">*</span></div>
    <div class="form-row">
      <label>今日執行事項 <span class="req">*</span></label>
      <textarea id="today_done" placeholder="今天主要做了哪些事..."></textarea>
    </div>
    <div class="form-row">
      <label>班級狀況</label>
      <textarea id="class_status" placeholder="今日班級整體狀況、秩序、學習氛圍..."></textarea>
    </div>
    <div class="form-row">
      <label>特殊事件紀錄</label>
      <textarea id="special_event" placeholder="有突發事件再填，並寫處理過程..."></textarea>
    </div>
    <div class="form-row">
      <label>明日待辦事項 <span class="req">*</span></label>
      <textarea id="tomorrow_todo" placeholder="明天要接續或準備的事..."></textarea>
    </div>
  </div>

  <div class="card">
    <div class="step-title"><span class="step-no">2</span> 親師溝通 <span class="req">*</span></div>
    <div class="form-row">
      <label>今日是否有家長聯繫？ <span class="req">*</span></label>
      <div class="punch-row">
        <button class="btn" id="pc-yes" onclick="setParentContact(true)">有</button>
        <button class="btn" id="pc-no" onclick="setParentContact(false)">無</button>
      </div>
    </div>
    <div class="form-row" id="parent-summary-wrap" style="display:none;">
      <label>溝通內容摘要 <span class="req">*</span></label>
      <textarea id="parent_summary" placeholder="與哪位家長、溝通什麼、結果..."></textarea>
    </div>
    <div class="form-row">
      <label>學生特殊狀況</label>
      <textarea id="student_special" placeholder="有需要追蹤的學生狀況再填..."></textarea>
    </div>
  </div>

  <!-- Step 3 工作類型 -->
  <div class="card">
    <div class="step-title"><span class="step-no">3</span> 今日工作類型 <span class="req">*至少 1 項</span></div>
    <div class="type-grid" id="type-grid"></div>
    <div class="helper-text">勾選後下方自動展開對應紀錄</div>
  </div>

  <!-- Step 4 動態展開 -->
  <div id="dynamic-forms"></div>

  <!-- Step 5 心得 + 送出 -->
  <div class="card">
    <div class="step-title"><span class="step-no">5</span> 今日心得 & 求助</div>
    <div class="form-row">
      <label>今日心得（自由文字）</label>
      <textarea id="reflection" placeholder="今天的觀察、收穫、想分享的事..."></textarea>
    </div>
    <div class="form-row">
      <label style="display:flex; gap:8px; align-items:center;">
        <input type="checkbox" id="help-needed" style="width:auto;">
        <span>⚠️ 需要主管協助</span>
      </label>
    </div>
    <div class="form-row" id="help-content-wrap" style="display:none;">
      <label>求助內容</label>
      <textarea id="help-content" placeholder="想請主管協助什麼？"></textarea>
    </div>
    <div class="miss-banner" id="miss-banner"></div>
    <button class="btn btn-primary" style="width:100%;" onclick="submitLog()">💾 提交今日日報</button>
  </div>

  <div class="text-sm muted text-center mt-2" id="autosave-info"></div>
</div>

<div class="nav-buttons" id="bottom-nav">
  <button class="btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ 回頂端</button>
  <button class="btn btn-primary" onclick="submitLog()">💾 提交日報</button>
</div>

<script>
const session = AUTH.requireRole(['teacher', 'manager']);

// 工作類型 → 對應 KPI 桶與展開區塊類型
const WORK_TYPES = [
  { key: '安親課輔', icon: '📖', block: 'tutoring', kpi: 1 },
  { key: 'STEAM課程', icon: '🔬', block: 'course', kpi: 3 },
  { key: '積木課程', icon: '🧱', block: 'course', kpi: 3 },
  { key: '閱讀寫作', icon: '✍️', block: 'course', kpi: 3 },
  { key: '專案課程', icon: '🎯', block: 'project', kpi: 3 },
  { key: '行政工作', icon: '🗂', block: 'admin', kpi: 6 },
];

let punchTimes = { checkin: '', checkout: '' };
let parentContacted = null;        // null 未選 / true / false
const attachments = {};            // { kpiNo: [{type,url,fileId,kpi,description,forType}] }
let autoSaveTimer;

window.addEventListener('load', async () => {
  UI.mountHeader(session);
  document.getElementById('today-date').textContent = formatToday();
  document.getElementById('user-dept').textContent = session.department;
  document.getElementById('user-nick').textContent = session.nickname;

  renderTypeGrid();

  await loadTodayLog();

  document.body.addEventListener('input', scheduleSave);
  document.getElementById('help-needed').addEventListener('change', e => {
    document.getElementById('help-content-wrap').style.display = e.target.checked ? 'block' : 'none';
  });
});

// ===== 工具 =====
function formatToday() {
  const d = new Date();
  const dn = ['日','一','二','三','四','五','六'];
  return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0') + ' (' + dn[d.getDay()] + ')';
}
function todayDateStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function nowTime() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function chk(id) { const el = document.getElementById(id); return el ? el.checked : false; }
function scheduleSave() { clearTimeout(autoSaveTimer); autoSaveTimer = setTimeout(autoSave, 1500); }

// ===== 打卡 =====
function punch(type) {
  if (!punchTimes[type]) punchTimes[type] = nowTime();
  renderPunch();
  scheduleSave();
}
function renderPunch() {
  const inBtn = document.getElementById('btn-checkin');
  const outBtn = document.getElementById('btn-checkout');
  if (punchTimes.checkin) { inBtn.textContent = '✅ 上班 ' + punchTimes.checkin; inBtn.classList.add('punch-done'); }
  if (punchTimes.checkout) { outBtn.textContent = '✅ 下班 ' + punchTimes.checkout; outBtn.classList.add('punch-done'); }
}

// ===== 親師溝通 =====
function setParentContact(yes) {
  parentContacted = yes;
  document.getElementById('pc-yes').classList.toggle('punch-done', yes === true);
  document.getElementById('pc-no').classList.toggle('punch-done', yes === false);
  document.getElementById('parent-summary-wrap').style.display = yes ? 'block' : 'none';
  scheduleSave();
}

// ===== 工作類型 =====
function renderTypeGrid() {
  document.getElementById('type-grid').innerHTML = WORK_TYPES.map((t, i) => `
    <label class="type-chip" id="chip-${i}">
      <input type="checkbox" value="${t.key}" onchange="onTypeToggle()"> ${t.icon} ${t.key}
    </label>
  `).join('');
}
function checkedTypes() {
  return WORK_TYPES.filter((t, i) => {
    const cb = document.querySelector(`#chip-${i} input`);
    return cb && cb.checked;
  });
}
function onTypeToggle() {
  WORK_TYPES.forEach((t, i) => {
    const chip = document.getElementById('chip-' + i);
    const cb = document.querySelector(`#chip-${i} input`);
    chip.classList.toggle('on', cb.checked);
  });
  renderDynamic();
  scheduleSave();
}

// ===== 動態展開 =====
function renderDynamic(savedData) {
  const wrap = document.getElementById('dynamic-forms');
  const types = checkedTypes();
  // 保留已輸入值
  const prev = collectDynamic();
  wrap.innerHTML = types.map((t, idx) => blockHtml(t, idx)).join('');
  // 回填
  const src = savedData || prev;
  types.forEach((t, idx) => fillBlock(t, idx, src));
  // 照片區重繪
  types.forEach((t, idx) => { if (t.block === 'course' || t.block === 'project') renderAttachments(blockId(t, idx)); });
}
function blockId(t, idx) { return `${t.block}-${idx}`; }

function blockHtml(t, idx) {
  const id = blockId(t, idx);
  if (t.block === 'tutoring') {
    return `<div class="card dyn-card">
      <div class="step-title"><span class="step-no">4</span> ${t.icon} ${t.key}</div>
      <div class="form-row"><label>批改作業班級數</label><input type="number" id="${id}_classes" placeholder="例：3"></div>
      <div class="form-row"><label>訂正完成率（%）</label><input type="number" id="${id}_correction" placeholder="0-100"></div>
      <div class="form-row"><label>個別補強學生（姓名/重點）</label><textarea id="${id}_help"></textarea></div>
    </div>`;
  }
  if (t.block === 'course') {
    return `<div class="card dyn-card" data-photo="${id}" data-kpi="3">
      <div class="step-title"><span class="step-no">4</span> ${t.icon} ${t.key} 備課紀錄 <span class="req">*</span></div>
      <div class="form-row"><label>課程名稱 <span class="req">*</span></label><input type="text" id="${id}_name"></div>
      <div class="form-row"><label>上課班級</label><input type="text" id="${id}_class"></div>
      <div class="form-row"><label>教學進度 <span class="req">*</span></label><textarea id="${id}_progress"></textarea></div>
      <div class="form-row"><label>孩子學習狀況</label><textarea id="${id}_learning"></textarea></div>
      <div class="form-row"><label>下次課程準備事項</label><textarea id="${id}_next"></textarea></div>
      ${photoArea(id, 3, '課程／活動照片', true)}
    </div>`;
  }
  if (t.block === 'project') {
    return `<div class="card dyn-card" data-photo="${id}" data-kpi="3">
      <div class="step-title"><span class="step-no">4</span> ${t.icon} ${t.key}紀錄 <span class="req">*</span></div>
      <div class="form-row"><label>今日進度 <span class="req">*</span></label><textarea id="${id}_progress"></textarea></div>
      <div class="form-row"><label>完成項目</label><textarea id="${id}_done"></textarea></div>
      <div class="form-row"><label>遇到問題</label><textarea id="${id}_problem"></textarea></div>
      <div class="form-row"><label>下階段規劃</label><textarea id="${id}_plan"></textarea></div>
      ${photoArea(id, 3, '專案照片', false)}
    </div>`;
  }
  if (t.block === 'admin') {
    return `<div class="card dyn-card">
      <div class="step-title"><span class="step-no">4</span> ${t.icon} ${t.key}成果</div>
      <div class="form-row"><label>行政工作內容/成果</label><textarea id="${id}_result" placeholder="完成的行政事項..."></textarea></div>
    </div>`;
  }
  return '';
}

function photoArea(id, kpi, label, required) {
  return `<div class="form-row">
    <label>📸 ${label} ${required ? '<span class="req">*至少 1 張</span>' : ''}</label>
    <div id="attach-${id}" class="attach-area"></div>
    <input type="file" accept="image/*" capture="environment" id="photo-input-${id}" style="display:none" onchange="onPhotoPicked(event, '${id}', ${kpi})">
    <button class="btn btn-sm mt-1" onclick="document.getElementById('photo-input-${id}').click()">📷 拍照／選圖</button>
  </div>`;
}

function fillBlock(t, idx, src) {
  const id = blockId(t, idx);
  const d = (src && src[id]) || {};
  Object.entries(d).forEach(([k, v]) => {
    if (k === '_photos') { attachments[id] = v.slice(); return; }
    const el = document.getElementById(id + '_' + k);
    if (el) el.value = v;
  });
}

function collectDynamic() {
  const out = {};
  // 以目前勾選類型逐一收
  checkedTypes().forEach((t, idx) => {
    const id = blockId(t, idx);
    const obj = {};
    document.querySelectorAll(`[id^="${id}_"]`).forEach(el => {
      const key = el.id.slice(id.length + 1);
      if (el.value !== undefined && el.value !== '') obj[key] = el.value;
    });
    if (attachments[id] && attachments[id].length) obj._photos = attachments[id].slice();
    out[id] = obj;
  });
  return out;
}

// ===== 照片（壓縮 + 上傳 Drive）=====
function driveThumb(url, fileId) {
  const id = fileId || ((url || '').match(/\/d\/([^/]+)/) || [])[1];
  return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w200` : url;
}
function compressImage(file, maxDim = 1280, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if (width >= height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
        else if (height > width && height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
        const c = document.createElement('canvas');
        c.width = width; c.height = height;
        c.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
async function onPhotoPicked(event, blockKey, kpiNo) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file || !file.type.startsWith('image/')) return;
  const wrap = document.getElementById('attach-' + blockKey);
  const ph = document.createElement('div');
  ph.className = 'photo-uploading'; ph.textContent = '上傳中…';
  if (wrap) wrap.appendChild(ph);
  let dataUrl;
  try { dataUrl = await compressImage(file); }
  catch (e) { ph.remove(); UI.toast('照片讀取失敗', 'danger'); return; }
  const res = await API.uploadPhoto({
    nickname: session.nickname, date: todayDateStr(), kpi: kpiNo, mimeType: 'image/jpeg', base64: dataUrl.split(',')[1],
  });
  ph.remove();
  if (!res.ok) { UI.toast('上傳失敗：' + (res.error || ''), 'danger'); return; }
  attachments[blockKey] = attachments[blockKey] || [];
  attachments[blockKey].push({ type: 'photo', url: res.url, fileId: res.fileId, kpi: kpiNo, description: '', forType: blockKey });
  renderAttachments(blockKey);
  scheduleSave();
  UI.toast('照片已存檔 ✅', 'success');
}
function renderAttachments(blockKey) {
  const wrap = document.getElementById('attach-' + blockKey);
  if (!wrap) return;
  const list = attachments[blockKey] || [];
  wrap.innerHTML = list.map((a, i) => `
    <div class="attach-photo">
      <a href="${a.url}" target="_blank"><img src="${driveThumb(a.url, a.fileId)}" alt="照片" loading="lazy"></a>
      <span class="att-del" onclick="removeAttachment('${blockKey}', ${i})">✕</span>
    </div>`).join('');
}
function removeAttachment(blockKey, idx) {
  attachments[blockKey].splice(idx, 1);
  renderAttachments(blockKey);
  scheduleSave();
}

// ===== 組裝成 KPI 六桶（後端評核相容）=====
function collectFormData() {
  const dyn = collectDynamic();
  const types = checkedTypes().map(t => t.key);

  // 把動態區塊匯回 KPI 桶
  const kpi1 = {}, kpi3 = { courses: [], project: null };
  const allPhotos = [];
  checkedTypes().forEach((t, idx) => {
    const id = blockId(t, idx);
    const d = dyn[id] || {};
    const photos = (d._photos || []).map(p => ({ ...p, kpi: t.kpi }));
    allPhotos.push(...photos);
    if (t.block === 'tutoring') {
      if (d.classes) kpi1.class_count = d.classes;
      if (d.correction) kpi1.correction_rate = d.correction;
      if (d.help) kpi1.individual_help = d.help;
    } else if (t.block === 'course') {
      kpi3.courses.push({ type: t.key, name: d.name || '', class: d.class || '', progress: d.progress || '', learning: d.learning || '', next: d.next || '' });
    } else if (t.block === 'project') {
      kpi3.project = { progress: d.progress || '', done: d.done || '', problem: d.problem || '', plan: d.plan || '' };
    }
  });

  const data = {
    kpi1_data: kpi1,
    kpi2_data: {
      env_classroom: chk('env_classroom'), env_tools: chk('env_tools'), env_trash: chk('env_trash'),
      equipment_issue: val('equipment_issue'), class_status: val('class_status'),
    },
    kpi3_data: kpi3,
    kpi4_data: {},
    kpi5_data: {
      parent_contacted: parentContacted,   // 三態：null 未選 / true / false
      parent_summary: val('parent_summary'),
      student_special: val('student_special'),
    },
    kpi6_data: {
      today_done: val('today_done'), tomorrow_todo: val('tomorrow_todo'),
      special_event: val('special_event'),
      work_types: types,
      admin_result: (dyn[Object.keys(dyn).find(k => k.startsWith('admin-')) || ''] || {}).result || '',
    },
    attachments: allPhotos,
    reflection: val('reflection'),
    help_needed: chk('help-needed'),
    help_content: val('help-content'),
    checkin_at: punchTimes.checkin,
    checkout_at: punchTimes.checkout,
  };
  return data;
}

// ===== 必填檢核 =====
function findMissing() {
  const m = [];
  if (!punchTimes.checkin) m.push('上班打卡');
  if (!(chk('env_classroom') && chk('env_tools') && chk('env_trash'))) m.push('環境整潔三項確認');
  if (!val('today_done')) m.push('今日執行事項');
  if (!val('tomorrow_todo')) m.push('明日待辦事項');
  if (parentContacted === null) m.push('親師溝通（請選有/無）');
  if (parentContacted === true && !val('parent_summary')) m.push('溝通內容摘要');
  const types = checkedTypes();
  if (types.length === 0) m.push('至少勾選 1 個工作類型');
  types.forEach((t, idx) => {
    const id = blockId(t, idx);
    if (t.block === 'course') {
      if (!val(id + '_name')) m.push(`${t.key}：課程名稱`);
      if (!val(id + '_progress')) m.push(`${t.key}：教學進度`);
      if (!(attachments[id] && attachments[id].length)) m.push(`${t.key}：至少 1 張課程照片`);
    }
    if (t.block === 'project') {
      if (!val(id + '_progress')) m.push(`${t.key}：今日進度`);
    }
  });
  return m;
}

// ===== 儲存 / 送出 =====
async function autoSave(silent) {
  const data = collectFormData();
  const payload = { nickname: session.nickname, date: todayDateStr(), ...data };
  const info = document.getElementById('autosave-info');
  if (!silent) info.textContent = '💾 儲存中...';
  const res = await API.saveLog(payload);
  if (res.ok) {
    info.textContent = '💾 草稿自動儲存於 ' + nowTime();
    info.style.color = '';
  } else {
    info.textContent = '⚠️ 儲存失敗：' + (res.error || '未知錯誤');
    info.style.color = 'var(--danger)';
  }
  return res;
}

async function submitLog() {
  const missing = findMissing();
  const banner = document.getElementById('miss-banner');
  if (missing.length) {
    banner.style.display = 'block';
    banner.innerHTML = '❌ 還不能送出，請補完：<br>• ' + missing.join('<br>• ');
    banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
    UI.toast('有必填未完成', 'warn');
    return;
  }
  banner.style.display = 'none';
  const res = await autoSave(true);
  if (!res.ok) { UI.toast('送出失敗：' + (res.error || ''), 'danger'); return; }
  UI.toast('日報已提交！', 'success');
  setTimeout(() => window.location.href = 'mylog.html', 1000);
}

// ===== 載入今日草稿 =====
async function loadTodayLog() {
  UI.loading(true);
  const res = await API.getTodayLog(session.nickname);
  UI.loading(false);
  if (res.ok && res.log) populateForm(res.log);
}

function populateForm(log) {
  const set = (id, v) => { const el = document.getElementById(id); if (el && v != null) el.value = v; };
  const setChk = (id, v) => { const el = document.getElementById(id); if (el) el.checked = !!v; };

  // 打卡
  punchTimes.checkin = log.checkin_at || ''; punchTimes.checkout = log.checkout_at || '';
  renderPunch();

  const k2 = log.kpi2_data || {}, k5 = log.kpi5_data || {}, k6 = log.kpi6_data || {};
  setChk('env_classroom', k2.env_classroom); setChk('env_tools', k2.env_tools); setChk('env_trash', k2.env_trash);
  set('equipment_issue', k2.equipment_issue); set('class_status', k2.class_status);
  set('today_done', k6.today_done); set('tomorrow_todo', k6.tomorrow_todo); set('special_event', k6.special_event);
  set('parent_summary', k5.parent_summary); set('student_special', k5.student_special);
  set('reflection', log.reflection);
  setChk('help-needed', log.help_needed === true);
  set('help-content', log.help_content);
  if (log.help_needed === true) document.getElementById('help-content-wrap').style.display = 'block';

  // 親師溝通有/無還原（三態，未選則維持 null 不還原）
  if (k5.parent_contacted === true) setParentContact(true);
  else if (k5.parent_contacted === false) setParentContact(false);

  // 工作類型 + 動態還原
  const types = Array.isArray(k6.work_types) ? k6.work_types : [];
  const savedBlocks = rebuildBlocksFromKpi(log, types);
  // 勾選 checkbox
  WORK_TYPES.forEach((t, i) => {
    const cb = document.querySelector(`#chip-${i} input`);
    if (cb && types.includes(t.key)) { cb.checked = true; document.getElementById('chip-'+i).classList.add('on'); }
  });
  renderDynamic(savedBlocks);
}

// 把 KPI 桶還原成動態區塊資料（依目前勾選順序對齊）
function rebuildBlocksFromKpi(log, types) {
  const out = {};
  const k1 = log.kpi1_data || {}, k3 = log.kpi3_data || {}, k6 = log.kpi6_data || {};
  const courses = Array.isArray(k3.courses) ? k3.courses : [];
  const photos = Array.isArray(log.attachments) ? log.attachments.filter(a => a.type === 'photo') : [];
  let courseIdx = 0;
  // 依 WORK_TYPES 定義的順序，過濾出有勾的，與展開後 index 對齊
  const ordered = WORK_TYPES.filter(t => types.includes(t.key));
  ordered.forEach((t, idx) => {
    const id = `${t.block}-${idx}`;
    if (t.block === 'tutoring') {
      out[id] = { classes: k1.class_count, correction: k1.correction_rate, help: k1.individual_help };
    } else if (t.block === 'course') {
      const c = courses.find(c => c.type === t.key) || courses[courseIdx++] || {};
      out[id] = { name: c.name, class: c.class, progress: c.progress, learning: c.learning, next: c.next, _photos: photos.filter(p => p.forType === id) };
    } else if (t.block === 'project') {
      const p = k3.project || {};
      out[id] = { progress: p.progress, done: p.done, problem: p.problem, plan: p.plan, _photos: photos.filter(ph => ph.forType === id) };
    } else if (t.block === 'admin') {
      out[id] = { result: k6.admin_result };
    }
  });
  return out;
}
