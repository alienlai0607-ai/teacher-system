<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>布拉克星球 KPI 系統</title>
<link rel="stylesheet" href="shared/style.css?v=20260624h">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="shared/config.js"></script>
<script src="shared/auth.js"></script>
<script src="shared/api.js"></script>
<script src="shared/ui.js"></script>
</head>
<body class="login-page">

<div class="login-card">
  <div class="login-logo"><img src="shared/icons/logo.png" alt="布拉克星球" /></div>
  <div class="login-title">布拉克星球 KPI 系統</div>
  <div class="login-subtitle">老師工作日誌 × KPI 評核</div>

  <div id="g-signin-btn"></div>

  <div id="claim-section" style="display:none; margin-top: 20px;">
    <hr style="border:none; border-top:1px solid var(--border); margin: 20px 0;">
    <div class="text-sm muted mb-2">尚未綁定暱稱，請選擇您的身份：</div>
    <div id="nickname-list" style="text-align: left; max-height: 280px; overflow-y: auto;"></div>
  </div>

  <div id="status-msg" class="mt-2 text-sm muted"></div>
</div>

<script>
let currentEmail = '';

window.addEventListener('load', () => {
  // 若已有 session 直接跳轉
  const s = AUTH.getSession();
  if (s) {
    setStatus('已登入為 ' + s.nickname + '，導向中...');
    setTimeout(() => AUTH.routeByRole(s.role), 500);
    return;
  }
  initGoogleSignIn();
});

function initGoogleSignIn() {
  if (!window.google || !google.accounts) {
    setTimeout(initGoogleSignIn, 200);
    return;
  }
  google.accounts.id.initialize({
    client_id: APP_CONFIG.GOOGLE_CLIENT_ID,
    callback: onGoogleSignIn,
    auto_select: false,
  });
  google.accounts.id.renderButton(
    document.getElementById('g-signin-btn'),
    { theme: 'filled_blue', size: 'large', text: 'signin_with', shape: 'pill', width: 280 }
  );
}

async function onGoogleSignIn(response) {
  const payload = AUTH.decodeJwt(response.credential);
  if (!payload || !payload.email) {
    setStatus('登入失敗，請重試');
    return;
  }
  currentEmail = payload.email.toLowerCase();
  setStatus('驗證中...（' + currentEmail + '）');
  UI.loading(true);

  const res = await API.whoami(currentEmail);
  UI.loading(false);

  if (!res.ok) {
    setStatus('API 錯誤：' + res.error);
    return;
  }

  if (res.registered) {
    AUTH.setSession(res.user);
    setStatus('歡迎 ' + res.user.nickname + '！導向中...');
    setTimeout(() => AUTH.routeByRole(res.user.role), 600);
  } else {
    setStatus('此 Email 尚未綁定暱稱');
    await showNicknameClaimUI();
  }
}

async function showNicknameClaimUI() {
  document.getElementById('claim-section').style.display = 'block';
  UI.loading(true);
  const res = await API.listAvailableNicknames();
  UI.loading(false);

  const list = document.getElementById('nickname-list');
  if (!res.ok || !res.nicknames || res.nicknames.length === 0) {
    list.innerHTML = '<div class="text-sm muted">目前沒有可認領的暱稱，請聯絡管理員（柏翰）</div>';
    return;
  }
  list.innerHTML = res.nicknames.map(n => `
    <button class="btn" style="width:100%; margin-bottom:6px; display:flex; justify-content:space-between;"
            onclick="claimNickname('${n.nickname}')">
      <span style="font-weight:700">${n.nickname}</span>
      <span class="muted text-sm">${n.department} · ${UI.roleLabel(n.role)}</span>
    </button>
  `).join('');
}

async function claimNickname(nickname) {
  const ok = await UI.confirmDialog(`確認以「${nickname}」身份登入？\n綁定後此暱稱僅能由 ${currentEmail} 登入。`);
  if (!ok) return;

  UI.loading(true);
  const res = await API.claimNickname(currentEmail, nickname);
  UI.loading(false);

  if (!res.ok) {
    UI.toast(res.error, 'danger');
    return;
  }
  AUTH.setSession(res.user);
  UI.toast('綁定成功！', 'success');
  setTimeout(() => AUTH.routeByRole(res.user.role), 800);
}

function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}
</script>

</body>
</html>
