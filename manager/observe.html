<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>觀課/巡班紀錄</title>
<link rel="stylesheet" href="../shared/style.css?v=20260624d">
<script src="../shared/config.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
</head>
<body>
<div id="app-header"></div>

<div class="container-narrow">
  <h2>🔍 觀課 / 巡班紀錄</h2>

  <div class="card">
    <div class="card-title">📝 新增紀錄</div>
    <div class="form-grid">
      <div class="form-row">
        <label>類型</label>
        <select id="type">
          <option value="observe">正式觀課（20-30分鐘）</option>
          <option value="patrol">巡班觀察</option>
        </select>
      </div>
      <div class="form-row">
        <label>日期</label>
        <input type="date" id="date">
      </div>
      <div class="form-row">
        <label>觀察對象</label>
        <select id="observed"></select>
      </div>
      <div class="form-row">
        <label>時長（分鐘）</label>
        <input type="number" id="duration_min" value="20">
      </div>
      <div class="form-row">
        <label>整體評分（0-5）</label>
        <input type="number" id="score" min="0" max="5" step="0.5" value="4">
      </div>
    </div>
    <div class="form-row">
      <label>觀察重點與回饋</label>
      <textarea id="notes" placeholder="例：班級秩序穩定、引導學生主動發言、教案準備完整..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="submit()">儲存紀錄</button>
  </div>

  <div class="card">
    <div class="card-title">📋 最近紀錄</div>
    <div id="recent"></div>
  </div>
</div>

<script>
const session = AUTH.requireRole(['manager']);

window.addEventListener('load', async () => {
  UI.mountHeader(session);
  document.getElementById('date').value = new Date().toISOString().slice(0, 10);
  await loadTeachers();
  await loadRecent();
});

async function loadTeachers() {
  const res = await API.listUsers();
  if (!res.ok) return;
  const teachers = res.users.filter(u => u.role === 'teacher' && u.department === session.department);
  document.getElementById('observed').innerHTML = teachers.map(t => `<option value="${t.nickname}">${t.nickname}</option>`).join('');
}

async function loadRecent() {
  const res = await API.listObservations({ observer: session.nickname });
  if (!res.ok) return;
  const wrap = document.getElementById('recent');
  if (res.observations.length === 0) {
    wrap.innerHTML = '<div class="muted">尚無紀錄</div>';
    return;
  }
  wrap.innerHTML = res.observations.slice(0, 20).map(o => `
    <div style="padding:10px 0; border-bottom:1px solid var(--border);">
      <div class="flex-between">
        <div><strong>${UI.formatDate(o.date)}</strong> · ${o.type === 'observe' ? '觀課' : '巡班'} · ${o.observed}</div>
        <div>⭐ ${o.score}/5 · ${o.duration_min}分</div>
      </div>
      <div class="text-sm muted">${o.notes || ''}</div>
    </div>
  `).join('');
}

async function submit() {
  const payload = {
    observer: session.nickname,
    observed: document.getElementById('observed').value,
    type: document.getElementById('type').value,
    date: document.getElementById('date').value,
    duration_min: Number(document.getElementById('duration_min').value),
    score: Number(document.getElementById('score').value),
    notes: document.getElementById('notes').value,
  };
  if (!payload.observed || !payload.notes) {
    UI.toast('請填寫對象與觀察重點', 'warn');
    return;
  }
  UI.loading(true);
  const res = await API.addObservation(payload);
  UI.loading(false);
  if (!res.ok) {
    UI.toast(res.error, 'danger');
    return;
  }
  UI.toast('紀錄已儲存', 'success');
  document.getElementById('notes').value = '';
  loadRecent();
}
</script>
</body>
</html>
