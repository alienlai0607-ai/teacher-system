<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>月度評核</title>
<link rel="stylesheet" href="../shared/style.css?v=20260624k">
<script src="../shared/config.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/pwa.js"></script>
<script src="../shared/push.js"></script>
<style>
  .eval-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .eval-layout > * { min-width: 0; }   /* 格子可縮小，防手機被長內容撐寬 */
  @media (max-width: 900px) { .eval-layout { grid-template-columns: 1fr; } }
  .evidence-block { background: #f7f6fb; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
  .evidence-title { font-weight: 700; font-size: 14px; color: var(--primary); margin-bottom: 6px; }
  .score-row {
    display: grid;
    grid-template-columns: 1fr 90px;
    gap: 10px;
    align-items: center;
    margin-bottom: 10px;
    padding: 8px;
    border-radius: 8px;
  }
  .score-row:hover { background: #f7f6fb; }
  .score-row input { text-align: center; font-weight: 700; font-size: 18px; }
  .total-box {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #fff;
    padding: 20px 16px;
    border-radius: var(--radius);
    text-align: center;
    position: sticky;
    bottom: 12px;
  }
  .total-num { font-size: 40px; font-weight: 800; }
  @media (max-width: 600px) {
    .score-row { grid-template-columns: 1fr 80px; }
    .score-row input { font-size: 16px; }
    .total-num { font-size: 36px; }
  }
</style>
</head>
<body>
<div id="app-header"></div>

<div class="container">
  <h2>📝 月度評核</h2>

  <div class="card">
    <div class="form-grid">
      <div class="form-row">
        <label>選擇老師</label>
        <select id="select-teacher" onchange="loadEvidence()"></select>
      </div>
      <div class="form-row">
        <label>評核月份</label>
        <input type="month" id="select-month" value="" onchange="loadEvidence()">
      </div>
    </div>
  </div>

  <div id="eval-content" style="display:none;">
    <div class="eval-layout">
      <!-- 左側：證據 -->
      <div>
        <div class="card">
          <div class="card-title">📂 自動彙整證據</div>
          <div id="summary"></div>
          <div id="evidence-list"></div>
        </div>
      </div>

      <!-- 右側：評分 -->
      <div>
        <div class="card">
          <div class="card-title" id="kpi-card-title">📊 KPI 評分（70 分）</div>
          <div id="score-inputs"></div>
        </div>

        <div class="card" id="okr-card">
          <div class="card-title">🎯 OKR 評分（30 分）</div>
          <div class="form-row">
            <label>OKR 達成度評分</label>
            <input type="number" id="score_okr" min="0" max="30" value="0" oninput="recalc()">
          </div>
        </div>

        <div class="card" id="late-card" style="display:none;">
          <div class="card-title">⏰ 出勤紀律（獨立於 100 分之外）</div>
          <div class="form-row">
            <label>本月遲到次數</label>
            <input type="number" id="score_late_count" min="0" value="0" oninput="recalc()">
          </div>
          <div class="muted text-sm">遲到累計 ≥3 次：自第 3 次起每次扣 5 分（前 2 次不扣），或直接降一個獎金等級（系統取較重者）。</div>
          <div class="text-sm mt-1" id="late-note" style="display:none; color:#c0392b; font-weight:700;"></div>
        </div>

        <div class="card" id="makeup-card" style="display:none;">
          <div class="card-title">⏳ 日報補繳扣分（系統自動）</div>
          <div class="text-sm" id="makeup-note" style="color:#c0392b; font-weight:700;"></div>
          <div class="muted text-sm mt-1">每次補繳日報扣 2 分（每月上限 3 次），依當月日誌自動統計，儲存時後端會再核算一次。</div>
        </div>

        <div class="card">
          <div class="card-title">💬 評語與面談紀錄</div>
          <div class="form-row">
            <label>主管評語</label>
            <textarea id="manager_comment" placeholder="本月表現重點、需改進方向、優秀之處..."></textarea>
          </div>
          <div class="form-row">
            <label>面談紀錄</label>
            <textarea id="interview_notes" placeholder="面談日期、討論內容、下月 OKR 調整..."></textarea>
          </div>
        </div>

        <div class="total-box" id="total-box">
          <div id="score-breakdown">KPI 0 + OKR 0</div>
          <div class="total-num"><span id="total-score">0</span> / <span id="total-max">100</span></div>
          <div>⭐ <span id="grade">—</span> · 級距獎金 NT$<span id="bonus">0</span></div>
          <label style="display:flex; align-items:center; justify-content:center; gap:8px; margin-top:12px; cursor:pointer;">
            <input type="checkbox" id="bonus_granted" checked onchange="recalc()" style="width:auto;"> 核發此獎金（不勾＝本月不發）
          </label>
          <div style="margin-top:6px; font-size:17px;">實發獎金：<strong>NT$<span id="bonus-final">0</span></strong></div>
        </div>

        <div class="mt-2 flex gap-1">
          <button class="btn" onclick="saveEval('draft')">儲存草稿</button>
          <button class="btn btn-primary" onclick="saveEval('submitted')">完成評核</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const session = AUTH.requireRole(['manager']);
let teacherList = [];
let currentTeacher = null;     // 目前評核中的老師物件
let currentKpiDef = APP_CONFIG.TEACHER_KPI;
let currentAnqin = false;      // 是否安親 100 分制
let currentMakeupCount = 0;    // 當月補繳次數（每次扣 2 分，系統自動）

window.addEventListener('load', async () => {
  UI.mountHeader(session);
  await loadTeacherOptions();
  const now = new Date();
  document.getElementById('select-month').value = now.toISOString().slice(0, 7);
});

async function loadTeacherOptions() {
  const res = await API.listUsers();
  if (!res.ok) return;
  teacherList = res.users.filter(u => u.role === 'teacher' && u.department === session.department);
  const sel = document.getElementById('select-teacher');
  sel.innerHTML = '<option value="">-- 選擇老師 --</option>' +
    teacherList.map(t => `<option value="${t.nickname}">${t.nickname}</option>`).join('');
}

function renderScoreInputs() {
  const wrap = document.getElementById('score-inputs');
  wrap.innerHTML = currentKpiDef.map(k => `
    <div class="score-row">
      <div>${k.icon} ${k.name}（滿分 ${k.max}）</div>
      <input type="number" id="score_k${k.no}" min="0" max="${k.max}" value="0" oninput="recalc()">
    </div>
  `).join('');
}

// 依老師部門切換計分模型（安親 100 分 vs 老師 70+30）
function applyModelForTeacher(nickname) {
  currentTeacher = teacherList.find(t => t.nickname === nickname) || null;
  currentAnqin = window.isAnqinUser(currentTeacher);
  currentKpiDef = window.getTeacherKpiDef(currentTeacher);
  const kpiMax = currentKpiDef.reduce((s, k) => s + k.max, 0);
  document.getElementById('kpi-card-title').textContent = `📊 KPI 評分（${kpiMax} 分）`;
  // 安親：KPI 直接 100 分、OKR 獨立另計（不在此評）、顯示遲到欄
  document.getElementById('okr-card').style.display = currentAnqin ? 'none' : '';
  document.getElementById('late-card').style.display = currentAnqin ? '' : 'none';
  renderScoreInputs();
}

async function loadEvidence() {
  const nickname = document.getElementById('select-teacher').value;
  const ym = document.getElementById('select-month').value;
  if (!nickname || !ym) return;
  applyModelForTeacher(nickname);

  UI.loading(true);
  const res = await API.getEvalEvidence(nickname, ym);
  UI.loading(false);
  if (!res.ok) {
    UI.toast(res.error, 'danger');
    return;
  }

  document.getElementById('eval-content').style.display = 'block';

  // 摘要
  currentMakeupCount = Number(res.summary.makeup_count || 0);
  document.getElementById('summary').innerHTML = `
    <div class="stat-grid mb-2">
      <div class="stat-box"><div class="stat-num">${res.summary.log_count}</div><div class="stat-label">日誌數</div></div>
      <div class="stat-box"><div class="stat-num">${res.summary.evidence_count}</div><div class="stat-label">證據</div></div>
      <div class="stat-box"><div class="stat-num">${res.summary.feedback_count}</div><div class="stat-label">已給回饋</div></div>
      <div class="stat-box"><div class="stat-num">${res.summary.observation_count}</div><div class="stat-label">觀課/巡班</div></div>
      <div class="stat-box"><div class="stat-num" style="${currentMakeupCount ? 'color:#c0392b;' : ''}">${currentMakeupCount}</div><div class="stat-label">補繳次數</div></div>
    </div>
  `;
  // 補繳扣分卡（有補繳才顯示）
  document.getElementById('makeup-card').style.display = currentMakeupCount ? '' : 'none';
  document.getElementById('makeup-note').textContent =
    currentMakeupCount ? `本月補繳 ${currentMakeupCount} 次，自 KPI 總分扣 ${currentMakeupCount * 2} 分` : '';

  // 證據分類
  const KPI_DEF = currentKpiDef;
  document.getElementById('evidence-list').innerHTML = KPI_DEF.map(k => {
    const ev = res.evidence_by_kpi[k.no] || [];
    return `<div class="evidence-block">
      <div class="evidence-title">${k.icon} KPI${k.no} ${k.name}（${ev.length} 件）</div>
      ${ev.length === 0 ? '<div class="muted text-sm">無證據</div>' :
        ev.map(e => `<div class="text-sm"><a href="${e.url}" target="_blank">📎 ${UI.formatDate(e.date)} ${e.description || e.url.slice(0,30)}</a></div>`).join('')}
    </div>`;
  }).join('');

  // 套用建議分數
  Object.entries(res.suggestion).forEach(([key, val]) => {
    const el = document.getElementById('score_' + key);
    if (el) el.value = val;
  });

  // 載入已有評核
  const existRes = await API.getEval({ nickname, year_month: ym });
  if (existRes.ok && existRes.eval) {
    const e = existRes.eval;
    for (let i = 1; i <= 6; i++) {
      const v = e['score_k' + i];
      if (v !== '' && v != null) document.getElementById('score_k' + i).value = v;
    }
    document.getElementById('score_okr').value = e.score_okr || 0;
    document.getElementById('score_late_count').value = e.score_late_count || 0;
    document.getElementById('manager_comment').value = e.manager_comment || '';
    document.getElementById('interview_notes').value = e.interview_notes || '';
    // 還原核發決定（沒這欄位＝舊資料，預設核發）
    document.getElementById('bonus_granted').checked = !(e.bonus_granted === false || e.bonus_granted === 'FALSE' || e.bonus_granted === 'false');
  }

  recalc();
}

// 安親：依 100 分級距取等第；其餘：依 70 分級距
function tierFor(kpi) {
  if (currentAnqin) {
    const t = window.ANQIN_BONUS_TIERS.find(x => kpi >= x.min && kpi <= x.max);
    return t ? { grade: t.grade, bonus: t.bonus } : { grade: '—', bonus: 0 };
  }
  if (kpi >= 67) return { grade: '卓越', bonus: 3000 };
  if (kpi >= 63) return { grade: '優良', bonus: 2000 };
  if (kpi >= 60) return { grade: '達標', bonus: 1000 };
  if (kpi >= 55) return { grade: '基本合格', bonus: 0 };
  return { grade: '待改善', bonus: 0 };
}

function recalc() {
  let kpi = 0;
  currentKpiDef.forEach(k => {
    const el = document.getElementById('score_k' + k.no);
    kpi += el ? Number(el.value || 0) : 0;
  });
  const kpiMax = currentKpiDef.reduce((s, k) => s + k.max, 0);
  const okr = currentAnqin ? 0 : Number(document.getElementById('score_okr').value || 0);

  // 補繳扣分：每次 -2（與後端 saveEval 相同邏輯）
  const makeupPenalty = currentMakeupCount * 2;
  const kpiEff = Math.max(0, kpi - makeupPenalty);
  const mkText = makeupPenalty ? `｜補繳 ${currentMakeupCount} 次 −${makeupPenalty}` : '';

  document.getElementById('total-score').textContent = kpiEff + okr;
  document.getElementById('total-max').textContent = currentAnqin ? kpiMax : 100;
  document.getElementById('score-breakdown').textContent = currentAnqin
    ? `KPI ${kpi}${mkText} 分（OKR 獨立另計）`
    : `KPI ${kpi}${mkText} + OKR ${okr}`;

  let tier = tierFor(kpiEff);

  // 安親遲到扣分預覽（≥3 次：每次 -5 或 降一級，取較重者）
  const lateNote = document.getElementById('late-note');
  if (currentAnqin) {
    const lateCount = Number(document.getElementById('score_late_count').value || 0);
    if (lateCount >= 3) {
      const penalty = (lateCount - 2) * 5; // 第 3 次起才扣，每次 5 分
      const tierByPoints = tierFor(Math.max(0, kpiEff - penalty));
      // 降一級
      const tiers = window.ANQIN_BONUS_TIERS;
      let idx = tiers.findIndex(t => t.grade === tier.grade);
      if (idx < 0) idx = tiers.length - 1;
      const dropped = tiers[Math.min(tiers.length - 1, idx + 1)];
      const tierByDrop = { grade: dropped.grade, bonus: dropped.bonus };
      tier = (tierByPoints.bonus <= tierByDrop.bonus) ? tierByPoints : tierByDrop;
      lateNote.style.display = 'block';
      lateNote.textContent = `⚠️ 遲到 ${lateCount} 次：扣分後等第「${tier.grade}」、獎金 NT$${tier.bonus}`;
    } else {
      lateNote.style.display = 'none';
    }
  }

  document.getElementById('grade').textContent = tier.grade;
  document.getElementById('bonus').textContent = tier.bonus;
  const granted = document.getElementById('bonus_granted').checked;
  document.getElementById('bonus-final').textContent = granted ? tier.bonus : 0;
}

async function saveEval(status) {
  const nickname = document.getElementById('select-teacher').value;
  const ym = document.getElementById('select-month').value;
  if (!nickname || !ym) {
    UI.toast('請先選擇老師與月份', 'warn');
    return;
  }
  const payload = {
    nickname,
    year_month: ym,
    evaluator: session.nickname,
    status,
    score_okr: currentAnqin ? 0 : Number(document.getElementById('score_okr').value || 0),
    score_late_count: currentAnqin ? Number(document.getElementById('score_late_count').value || 0) : 0,
    manager_comment: document.getElementById('manager_comment').value,
    interview_notes: document.getElementById('interview_notes').value,
    bonus_granted: document.getElementById('bonus_granted').checked,
  };
  for (let i = 1; i <= 6; i++) {
    payload['score_k' + i] = Number(document.getElementById('score_k' + i).value || 0);
  }
  UI.loading(true);
  const res = await API.saveEval(payload);
  UI.loading(false);
  if (!res.ok) {
    UI.toast(res.error, 'danger');
    return;
  }
  UI.toast(`儲存成功（${res.grade} · NT$${res.bonus}）`, 'success');
}
</script>
</body>
</html>
