<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>回饋紀錄</title>
<link rel="stylesheet" href="../shared/style.css?v=20260624g">
<script src="../shared/config.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/ui.js"></script>
</head>
<body>
<div id="app-header"></div>

<div class="container">
  <h2>💬 我給予的回饋紀錄</h2>
  <div class="card">
    <div id="list"></div>
  </div>
</div>

<script>
const session = AUTH.requireRole(['manager']);

window.addEventListener('load', async () => {
  UI.mountHeader(session);
  const res = await API.listFeedback({ nickname: session.nickname });
  const wrap = document.getElementById('list');
  if (!res.ok) {
    wrap.innerHTML = '<div class="muted">載入失敗</div>';
    return;
  }
  const mine = res.feedback.filter(f => f.from_nickname === session.nickname);
  if (mine.length === 0) {
    wrap.innerHTML = '<div class="muted">尚未給予過回饋。請至「老師列表」進入老師日誌頁回饋。</div>';
    return;
  }
  wrap.innerHTML = mine.map(f => `
    <div style="padding:12px 0; border-bottom:1px solid var(--border);">
      <div class="flex-between">
        <div><strong>→ ${f.to_nickname}</strong> <span class="tag">${f.tag}</span></div>
        <div class="muted text-sm">${UI.formatDateTime(f.created_at)}</div>
      </div>
      <div>${f.content}</div>
      <div class="text-sm muted">${f.read_at ? '✅ 已讀 ' + UI.formatDateTime(f.read_at) : '⏰ 未讀'}</div>
    </div>
  `).join('');
});
</script>
</body>
</html>
